<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow Virtual Agent - iframe版テスト</title>
    <link rel="stylesheet" href="style.css">

    <!-- ================================================================ -->
    <!-- ▼▼▼ 移植対象（1/3）：CSS ▼▼▼                                     -->
    <!-- 外部サイトの <head> 内、既存の <style> タグ内に追加してください      -->
    <!-- ================================================================ -->
    <style>
        /* --- チャットボタン --- */
        .sn-va-fab {
            position: fixed;
            z-index: 1000 !important;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            cursor: pointer;
            bottom: 30px;
            left: 10px;
            background: #ffeef7;
            color: #000;
            padding: 0.8rem 1.6rem;
            font-size: 1rem;
            border-radius: 99.9rem;
            border: .1rem solid rgba(0, 0, 0, 0.15);
            font-weight: 600;
            box-shadow: 0 2rem 4rem rgba(0, 0, 0, 0.28);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: auto;
        }
        @media (hover: hover) {
            .sn-va-fab:hover { background: #FFF8D1; color: #333; }
        }
        .sn-va-fab:active { background: #FFF8D1; color: #333; }
        .sn-va-fab-img { height: 2.4rem; width: auto; margin-right: .5rem; aspect-ratio: 1 / 1; }
        .sn-va-fab__text { white-space: nowrap; }

        /* --- チャットボタン（開いている時） --- */
        .sn-va-fab.sn-va-open { transform: scale(0.9); }
        .sn-va-fab.sn-va-open .sn-va-fab-img { height: 3.0rem; }

        /* --- チャットウィンドウ --- */
        .sn-va-window {
            position: fixed; left: 24px; bottom: 140px; z-index: 9999;
            opacity: 0; visibility: hidden; transform: translateY(20px);
            transition: all 0.3s ease-in-out;
        }
        .sn-va-window.sn-va-open { opacity: 1; visibility: visible; transform: translateY(0); }
        .sn-va-frame-container {
            width: 375px; height: 600px; max-height: calc(100vh - 150px);
            background-color: #fff; border-radius: 10px;
            box-shadow: 0 5px 24px rgba(0, 0, 0, 0.2); overflow: hidden; border: 1px solid #ddd;
        }
        .sn-va-frame { width: 100%; height: 100%; border: none; display: block; }

        /* --- モバイル対応 --- */
        @media (max-width: 480px) {
            .sn-va-fab {
                padding: 5px 10px 5px 12px !important;
                left: 8px !important;
                bottom: 70px !important;
                font-size: 0.75rem !important;
                gap: 0.4rem !important;
            }
            .sn-va-fab-img { height: 1.6rem !important; margin-right: 0 !important; }
            .sn-va-fab__text span { font-size: 0.75rem !important; }
            .sn-va-window {
                left: 0 !important; top: 0 !important; bottom: 150px !important;
                width: 100% !important; height: auto !important;
            }
            .sn-va-frame-container {
                width: 100% !important; height: 100% !important;
                max-height: none !important; border-radius: 0 !important;
            }
        }
    </style>
    <!-- ================================================================ -->
    <!-- ▲▲▲ 移植対象（1/3）：CSS ここまで ▲▲▲                             -->
    <!-- ================================================================ -->
</head>
<body>
    <div class="container">
        <h1>ServiceNow Virtual Agent</h1>
        <p class="subtitle">dev1 Okazaki City - iframe版テスト</p>
        <div class="note">
            <p><strong>検証目的:</strong> iframe方式がEdge通常モードで動作するか確認するためのテストページです。</p>
        </div>
        <footer>
            <p>ServiceNow Virtual Agent - iframe版テスト</p>
        </footer>
    </div>

    <!-- ================================================================ -->
    <!-- ▼▼▼ 移植対象（2/3）：HTML ▼▼▼                                    -->
    <!-- 外部サイトの </body> 直前に追加してください                         -->
    <!-- ================================================================ -->

    <!-- チャットボタン -->
    <a class="sn-va-fab" id="sn-va-fab" onclick="toggleChat(event)">
        <img src="https://dev1okazakicity.service-now.com/sn_nava_config.okazaemon_close_btn.png"
             alt="" class="sn-va-fab-img" />
        <span class="sn-va-fab__text">
            <span id="sn-va-btn-text">チャットでお問い合わせ</span>
        </span>
    </a>

    <!-- チャットウィンドウ -->
    <div class="sn-va-window" id="sn-va-window">
        <div class="sn-va-frame-container">
            <iframe id="sn-va-frame" class="sn-va-frame" src="" allow="microphone"></iframe>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- ▲▲▲ 移植対象（2/3）：HTML ここまで ▲▲▲                            -->
    <!-- ================================================================ -->

    <!-- ================================================================ -->
    <!-- ▼▼▼ 移植対象（3/3）：JavaScript ▼▼▼                              -->
    <!-- HTMLの直後（</body>直前）に追加してください                         -->
    <!-- ================================================================ -->
    <script>
        var chatOpen = false;
        var chatLoaded = false;
        var chatUrl = 'https://dev1okazakicity.service-now.com/x_okac2_hp_hp_va_translate_wrapper.do'
            + '?sysparm_portal_id=2d35c60a2bd936104461f77ace91bf91'
            + '&sysparm_branding_key=now_assist_in_va'
            + '&sysparm_external=true';

        function toggleChat(event) {
            event.preventDefault();
            var chatWindow = document.getElementById('sn-va-window');
            var chatBtn = document.getElementById('sn-va-fab');
            var chatBtnText = document.getElementById('sn-va-btn-text');
            if (!chatOpen) {
                if (!chatLoaded) {
                    document.getElementById('sn-va-frame').src = chatUrl;
                    chatLoaded = true;
                }
                chatWindow.classList.add('sn-va-open');
                chatBtn.classList.add('sn-va-open');
                chatBtnText.textContent = 'とじる';
                chatOpen = true;
            } else {
                chatWindow.classList.remove('sn-va-open');
                chatBtn.classList.remove('sn-va-open');
                chatBtnText.textContent = 'チャットでお問い合わせ';
                chatOpen = false;
            }
        }
    </script>
    <!-- ================================================================ -->
    <!-- ▲▲▲ 移植対象（3/3）：JavaScript ここまで ▲▲▲                      -->
    <!-- ================================================================ -->
</body>
</html>
